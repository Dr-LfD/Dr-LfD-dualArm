defaults:
  - diffGenBase

use_wandb: true

training:
  # ckpt: "logs/train/aloha_clean_cup/2025-10-26_22-37-41/checkpoints/ckpt_comp.pth" 
  ckpt: "logs/train/aloha_clean_cup/2025-10-26_22-37-41/checkpoints/ckpt01900.pth" 
  eval_interval: 1
  num_epochs: 2000

env:
  env_class: 'clean_cup'
  num_eef: 2
  dof: 7
  max_episode_length: 50

agent:
  # agent_name: aloha
  agent_name: compaloha

model:
  # noise_scheduler:
  #   num_train_timesteps: 1000

# ## use vec_pointnet and train from scratch
#   hidden_dim: 32
#   encoder:
#     backbone_type: vn_pointnet
#     backbone_args: 
#       num_layers: 7
#       preload_path: "pretrained/mugs.pt"

### use VDGCNN and transfer from pretrained model
  hidden_dim: 256
  encoder:
    backbone_type: VDGCNN
    backbone_args: 
      num_layers: 7
      preload_path: "pretrained/mugs.pt"

data:
  dataset:
    num_points: 128
    symb_mask: ['qpose_left', 'qpose_right', 'grasp_left', 'grasp_right', None]
    # symb_mask: ['None', 'None', 'grasp_left', 'grasp_right', None]
    # symb_mask: [None, 'qpose_right', None, 'grasp_right', None]
    # symb_mask: [None, None, None, 'grasp_right', None]
    tamp_type: 'precondition'
    dataset_type: 'dual_hdf5_mini'
    # dataset_type: 'mj_insertion_pred'
    has_eff_list: [false, false]
    is_obj_centric: True
    is_add_bottom: False 


eval:
  history_bid: 10



