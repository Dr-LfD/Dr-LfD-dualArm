defaults:
  - diffGenBase

use_wandb: false

training:
  ckpt: "logs/train/aloha_transfer_tape/ckpt_smallnet_tape_50demo.pth"
  eval_interval: 1

env:
  env_class: 'tape'
  num_eef: 2
  dof: 7
  max_episode_length: 50


agent:
  agent_name: aloha

model:
  # noise_scheduler:
  #   num_train_timesteps: 1000

# ## use vec_pointnet and train from scratch
#   hidden_dim: 32
#   encoder:
#     backbone_type: vn_pointnet
#     backbone_args: 
#       num_layers: 2
#       preload_path: 'None' 


### use VDGCNN and transfer from pretrained model
  hidden_dim: 256
  encoder:
    backbone_type: VDGCNN
    backbone_args: 
      num_layers: 7
      preload_path: "pretrained/mugs.pt"

data:
  dataset:
    num_points: 256
    # symb_mask: ['qpose_left', 'qpose_right', None, None, None]
    symb_mask: ['qpose_left', 'qpose_right', None, 'grasp_right', None]
    # symb_mask: [None, 'qpose_right', None, 'grasp_right', None]
    # symb_mask: [None, None, None, 'grasp_right', None]
    tamp_type: 'precondition'
    dataset_type: 'hdf5_predeff'
    # dataset_type: 'sam_predeff'

    has_eff_list: [false]

    is_obj_centric: true

    preload_path: ${model.encoder.backbone_args.preload_path}


eval:
  history_bid: 10


