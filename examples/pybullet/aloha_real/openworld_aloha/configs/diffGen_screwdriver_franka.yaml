## copied from screwdriver_fresh.yaml

defaults:
  - diffGenBase

use_wandb: false

training:
## for aloha
  # ckpt: "/home/robotics/CoMa_code_clean/equibot_abstract/logs/train/screwdriver_fresh/ckpt_handDist14.pth"
  # ckpt: "/home/robotics/CoMa_code_clean/equibot_abstract/logs/train/franka_screwdriver/1view.pth"
  ckpt: "/home/robotics/CoMa_code_clean/equibot_abstract/logs/train/franka_screwdriver/ckpt_container.pth"
  # ckpt: "/home/robotics/CoMa_code_clean/equibot_abstract/logs/train/franka_screwdriver/ckpt_chair.pth"
  eval_interval: 1

env:
  env_class: 'screwdriver'
  num_eef: 2
  # dof: 6 # aloha
  dof: 7
  max_episode_length: 50


agent:
  agent_name: aloha

model:
  # noise_scheduler:
  #   num_train_timesteps: 1000

# ## use vec_pointnet and train from scratch
#   hidden_dim: 32
#   encoder:
#     backbone_type: vn_pointnet
#     backbone_args: 
#       num_layers: 4
#       preload_path: 'None' 


### use VDGCNN and transfer from pretrained model
  hidden_dim: 256
  encoder:
    backbone_type: VDGCNN
    backbone_args: 
      num_layers: 7
      preload_path: "/home/robotics/CoMa_code_clean/equibot_abstract/pretrained/kit4cates.pt"
      # preload_path: "/home/robotics/CoMa_code_clean/equibot_abstract/pretrained/chairs.pt"

data:
  dataset:
    num_points: 256
    symb_mask: ['qpose_left', 'qpose_right', 'grasp_left', None, None]

    tamp_type: 'precondition'
    dataset_type: 'hdf5_mini'

    has_eff: false

    is_obj_centric: true

    preload_path: ${model.encoder.backbone_args.preload_path}


eval:
  history_bid: 10



