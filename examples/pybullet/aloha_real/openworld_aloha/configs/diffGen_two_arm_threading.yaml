defaults:
  - diffGenBase

use_wandb: false

training:
  # ckpt: "logs/train/dmg_threading/ckpt_unigrasp.pth"
  # ckpt: "logs/train/dmg_threading/ckpt_integrated1view.pth"
  ckpt: "logs/train/dmg_threading/ckpt_integrated3view.pth"
  # ckpt: "logs/train/dmg_threading/ckpt_jposeclose_deepernet.pth"

  eval_interval: 1
  num_epochs: 2000

env:
  env_class: 'dmg_threading'
  num_eef: 2
  dof: 7
  max_episode_length: 50

agent:
  # agent_name: aloha
  # agent_name: compaloha
  agent_name: dmg

model:
  down_dims: [128, 256, 512]
### use VDGCNN and transfer from pretrained model
  hidden_dim: 256
  obs_horizon: 1
  pred_horizon: 8

  separate_encoder: False
  separate_policy: True
  # noise_scheduler:
  #   _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
  # num_diffusion_iters: 15 ## inference for DDIM

  encoder:
    backbone_type: VDGCNN
    backbone_args: 
      num_layers: 7
      preload_path: "pretrained/chairs.pt"

  embedding_cache_dir: "./data/bert"

  language_encoder_cfg:
    network_name: MLPEncoder
    input_size: 768
    hidden_size: 256
    num_layers: 1
    
data:
  dataset:
    num_points: 128
    n_use: 50
    # uniskills: []
    # skill_names: ['bimanual_0']
    # conditioned_objects: ['None']
    uniskills: ['grasp']
    skill_names: ['robot0_grasp_tripod_obj', 'robot1_grasp_needle_obj', 'bimanual_0']
    conditioned_objects: ['tripod_obj', 'needle_obj', 'None']
    dataset_type: 'robosuite_integrate_hdf5_traj'

    embedding_cache_dir: "./data/bert"

    # eef_representation: "4pts"
    eef_representation: "3vec"

    is_obj_centric: True
    is_add_bottom: True
    downsample_method: 'fps'
    rot_aug: True

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    agentview_image:
      shape: [3, 128, 128]
      type: rgb
    birdview_image:
      shape: [3, 128, 128]
      type: rgb
    frontview_image:
      shape: [3, 128, 128]
      type: rgb
    robot0_eye_in_hand_image:
      shape: [3, 128, 128]
      type: rgb
    robot0_eef_pos:
      shape: [3]
      # type default: low_dim
    robot0_eef_quat:
      shape: [4]
    robot0_gripper_qpos:
      shape: [2]
    robot1_eye_in_hand_image:
      shape: [3, 128, 128]
      type: rgb
    robot1_eef_pos:
      shape: [3]
      # type default: low_dim
    robot1_eef_quat:
      shape: [4]
    robot1_gripper_qpos:
      shape: [2]
  action: 
    shape: [14]


eval:
  history_bid: 10



