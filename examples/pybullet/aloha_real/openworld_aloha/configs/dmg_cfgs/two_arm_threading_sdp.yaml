use_gui: False
robot_name: 'pandadual'
vid_save_path: 'lfd_tamp_vids'
text_prompt:  [ 'tripod_obj', 'needle_obj']
primitive_learning_path: '${PRIMITIVE_LEARNING_ROOT}'
env_dir: '${DEXMIMICGEN_ROOT}/'

# pyb_env_addon: ['table-0.8']
pyb_env_addon: []
require_obstacle_pc: False

use_schema: true
schema_tmp_pddl_dir: '/tmp/pddlstream_aloha_debug'
skill_yaml_paths:
  - 'examples/pybullet/aloha_real/openworld_aloha/configs/dmg_cfgs/two_arm_threading.yaml'

contact_prediction_root: '${CONTACT_PREDICTION_ROOT}'

sg_params:
  max_tamp_time: 60
  task_name: 'two_arm_threading'
  robots: ['robot0', 'robot1']
  schema:
    path: 'two_arm_threading_changes.json'

  interested_objs:
    'tripod_obj': ['Movable', 'Graspable', 'CanPick']
    'needle_obj': ['Movable', 'Graspable', 'CanPick']

  interested_primitives: ['grasp', 'bimanual']

  attachment_collision_distance: 0.02
  learned_grasp_traj_resolution_deg: 1.2

  hand_hand_dist_threshold: 0.35

  # trained on per_skill_agent
  equi_ckpt_name: "logs/train/dmg_threading/ckpt_per_skill_uni_100demos.pth"
  # equi_ckpt_name: "logs/train/dmg_threading/threading_sdp_ddim.pth"
  biop_ckpt_name: "logs/train/dmg_threading/ckpt_perskill_jpose_near.pth"
  equi_config_name: "threading_per_skill"

  # ## trained on dmg_agent
  # equi_config_name: "diffGen_two_arm_threading"

  # EE-traj densification speed controls.
  # Smaller step_m / step_rad → more waypoints → slower grasp motion
  # NOTE: now wired through update_equivSkill_wrapper; values below equal the
  # stream defaults every prior OSC run effectively used. Tune deliberately.
  ee_traj_step_m: 0.01            # max translation per waypoint (metres)
  ee_traj_step_rad: 0.05          # max rotation per waypoint (radians)
  ee_traj_steps_per_waypoint: 1   # sim steps held at each waypoint

LfD_params:
  lfd_alg: 'SDP'
  DP_path: '${SPHERICAL_DP_ROOT}'
  env_type: 'dmg'
  DP_input:
    two_arm_threading: '${DIFFUSION_POLICY_ROOT}/data/outputs/two_arm_threading_sdp/100demo0.700.ckpt'

  vid_record: False
  DP_output: './data/eval/dmg_threading_sdp/'
  DP_max_timesteps: 900
  DP_num_inference_steps: 10
  render_obs_keys: [agentview_image , robot0_eye_in_hand_image, robot1_eye_in_hand_image]
  # render_obs_keys: [agentview_image]
