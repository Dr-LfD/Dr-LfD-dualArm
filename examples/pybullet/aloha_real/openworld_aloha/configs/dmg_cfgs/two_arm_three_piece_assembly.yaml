# OSC_POSE absolute-EE execution variant of two_arm_three_piece_assembly
use_gui: False
robot_name: 'pandadual'
vid_save_path: 'lfd_tamp_vids'
text_prompt:  ['base', 'piece_1', 'piece_2']
primitive_learning_path: '${PRIMITIVE_LEARNING_ROOT}'
env_dir: '${DEXMIMICGEN_ROOT}/'

# pyb_env_addon: ['table-0.8']
pyb_env_addon: []
require_obstacle_pc: False

use_schema: true
schema_tmp_pddl_dir: '/tmp/pddlstream_aloha_debug'
skill_yaml_paths:
  - 'examples/pybullet/aloha_real/openworld_aloha/configs/dmg_cfgs/two_arm_three_piece_assembly.yaml'

sg_params:
  task_name: 'two_arm_three_piece_assembly'
  max_tamp_time: 60
  robots: ['robot0', 'robot1']
  schema:
    path: 'two_arm_three_piece_assembly_changes.json'

  interested_objs:
    'base': ['CanInsert']
    'piece_1': ['Movable', 'Graspable', 'CanPick']
    'piece_2': ['Movable', 'Graspable', 'CanPick']

  interested_primitives: ['grasp', 'bimanual']

  attachment_collision_distance: -1

  hand_hand_dist_threshold: 0.35

  # trained on per_skill_agent
  equi_ckpt_name: "logs/train/dmg_assembly/200demo_inhand-fps.pth"
  biop_ckpt_name: "logs/train/dmg_assembly/ckpt_perskill_jpose.pth"
  equi_config_name: "assembly_per_skill"

  # EE-traj densification speed controls.
  # Smaller step_m / step_rad → more waypoints → slower grasp motion
  ee_traj_step_m: 0.01            # max translation per waypoint (metres)
  ee_traj_step_rad: 0.05          # max rotation per waypoint (radians)
  ee_traj_steps_per_waypoint: 1   # sim steps held at each waypoint


LfD_params:
  lfd_alg: 'DP'
  DP_path: '${DIFFUSION_POLICY_ROOT}'
  env_type: 'dmg'
  DP_input:
    two_arm_three_piece_assembly: '${DIFFUSION_POLICY_ROOT}/data/outputs/two_arm_assembly/sg_100demo_0.65.ckpt'
    # two_arm_three_piece_assembly: '${DIFFUSION_POLICY_ROOT}/data/outputs/two_arm_assembly/1000demo0.720.ckpt'

  # lfd_alg: 'SDP'
  # DP_path: '${SPHERICAL_DP_ROOT}/'
  # env_type: 'dmg'
  # DP_input:
  #   two_arm_three_piece_assembly: 'data/outputs/two_arm_three_piece_assembly/epoch=0440-test_mean_score=1.000.ckpt'

  vid_record: False
  DP_output: './data/eval/dmg_assembly/'
  DP_max_timesteps: 700
  DP_num_inference_steps: 10
  DP_scale: 4
  render_obs_keys: ["agentview_image", "robot0_eye_in_hand_image", "robot1_eye_in_hand_image"]
