robot_name: 'aloha'
use_gui: True
teleport: True
pyb_env_addon: []
refine_num: 10
pose_control: True
use_precomputed_path: False
motion_tolerance: 0.07
monitor_switch_t: 1
temp_vis_dir: 'examples/pybullet/aloha_real/openworld_aloha/estimation/temp_vis/'

# seg_branch / contact_wrist_seg_backend: sam3 | grounded_sam only (null mirrors seg_branch)
seg_branch: sam3
contact_wrist_seg_backend: null

sam_path: '${GROUNDED_SAM2_ROOT}/'
sam3_path: '${SAM3_ROOT}'
sam3_worker_path: '${REPO_ROOT}/examples/pybullet/aloha_real/openworld_aloha/workers/sam3_worker.py'
sam3_conda_env: 'sam3'
sam3_model_dir: '${HOME}/.cache/modelscope/hub/models/facebook/sam3'
sam3_checkpoint: null
use_sam_server: False
cache_masks: True

primitive_learning_path: '${PRIMITIVE_LEARNING_ROOT}'
contact_prediction_root: '${CONTACT_PREDICTION_ROOT}'
data_type: 'real'
real_execute: True
vid_save_path: 'lfd_tamp_vids'

use_schema: true
schema_tmp_pddl_dir: '/tmp/pddlstream_aloha_debug'


active_cams: ['cam2']
# active_cams: ['cam1', 'cam2']
# active_cams: ['cam1']

# Camera 1 (typically the back camera)
cam1_img_dir: 'back_realrobot'
cam1_name: 'camera'
cam1_ext_json: 'femto_bolt_camera_pose.json'
cam1_calink: False
# Depth topic for cam1 (either a full topic like '/camera/depth/image_raw'
# or a suffix like 'depth/image_raw' which will be prefixed with '/<cam1_name>/')
cam1_depth_topic: 'depth/image_raw'

# Camera 2 (typically the front camera)
cam2_img_dir: 'realrobot'
cam2_name: 'camera_2'
cam2_ext_json: 'camera_pose.json'
cam2_calink: False
# Depth topic for cam2 (either a full topic like '/camera_2/aligned_depth_to_color/image_raw'
# or a suffix like 'aligned_depth_to_color/image_raw' which will be prefixed with '/<cam2_name>/')
cam2_depth_topic: 'aligned_depth_to_color/image_raw'

random_rot_camera: False

# Camera high (USB overhead camera, no depth)
cam_high_name: 'usb_cam_high'
cam_high_ext_json: 'cam_high_pose.json'


filter_surface: False


LfD_params:
  lfd_alg: 'DP'
  env_type: 'real'
  # max_lfd_steps: 699
  # DP params
  DP_path: '${DIFFUSION_POLICY_ROOT}/'
  # DP_input: 
  #   dummy_skill: ~ # to make DP_input a dict
  DP_output: './data/eval/clean_cup/'
  DP_max_timesteps: 500 ## actually the time alloted for tamp + lfd together
  DP_num_inference_steps: 10
  DP_scale: 4
  render_obs_keys: ['cam_left_wrist', 'cam_right_wrist']
  ## ACT params
  ACT_path: '${ACT_ROOT}'

# existing_domain_path: "/tmp/pddlstream_aloha_debug/screw_handoff_clean_coarse_domain.pddl"
# existing_stream_path: "/tmp/pddlstream_aloha_debug/screw_handoff_clean_coarse_stream.pddl"
existing_domain_path: null
existing_stream_path: null
