contact_predictor_checkpoint: '/ssd1/chenyizhou/contact_ckpt/sponge_right_arm.ckpt'


sg_params:  
  h5_parent_dir: "/ssd1/aloha_data/clean_cup/"
  skill_name: 'clean_cup'
  skill_type: 'bimanualAnd'
  pre_obj_names: ['cup','sponge']
  # additional_objects: ['plunger']
  pre_arms: ['left', 'right']
  eff_obj_names: []
  output_dir: 'hdf5_out/clean_cup'
  related_rbts: ['left', 'right']
  # Inline schema: robot0=left grasps cup, robot1=right grasps sponge simultaneously.
  # Replace with schema.path once a dedicated JSON config is available.
  schema:
    path: '../aloha_cfgs/clean_cup_changes.json'

# uncomment me after training obj-centric primitives
  equi_ckpt_name: "logs/train/aloha_clean_cup/sdp/twograsp128.pth"
  biop_ckpt_name: "logs/train/aloha_clean_cup/sdp/biop_early.pth"

# NOTE: x_threashold is revised for aloha2
  left:
    grasp:
      x_threshold: -0
      dx_threshold: -0.7
    release:
      x_threshold: -1.0
      dx_threshold: 0.5
      clip_start: 100

  right:
    grasp:
      x_threshold: -0
      dx_threshold: -0.7
    release:
      x_threshold: -1
      dx_threshold: 0.5
      clip_start: 100
      
  hand_obj_dist_threshold: 0.1
  hand_hand_dist_threshold: 0.2
  lifted_threshold: 0.15
  holding_truncation: 1

LfD_params:
  lfd_alg: 'DP'
  env_type: 'real'
  DP_path: '${DIFFUSION_POLICY_ROOT}/'
  DP_input: 
    # bimanual_clean_cup_per_skill: '/ssd1/chenyizhou/dp_ckpts/clean_cup/long_chunk/dp_3view_place.ckpt'
    # bimanual_clean_cup_per_skill: '/ssd1/chenyizhou/dp_ckpts/clean_cup/long_chunk/fm_3view.ckpt'
    bimanual_clean_cup_per_skill: '/ssd1/chenyizhou/dp_ckpts/clean_cup/long_chunk/cluttered.ckpt'
